# GitHub Actions - Lint and Test
# Project: EyesDcar TEST
# Date: 24/04/2026
# Description: Code quality verification + unit tests

name: Lint and Test

on:
  push:
    branches:
      - 001-DEVELOPMENT
      - 002-TEST
      - 003-PRODUCTION
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - 'release/**'
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1 : LINT - Code quality analysis
  # ═══════════════════════════════════════════════════════════
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pre-commit hooks
        run: pre-commit install --install-hooks

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
        continue-on-error: true

      - name: Run Pylint and Save Report
        run: |
          pip install pylint
          # Redirect output to pylint-report.txt
          pylint $(find . -name "*.py" -type f ! -path "./test_hook/*" ! -path "./.git/*") \
            --disable=C0114,C0115,C0116 > pylint-report.txt || true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: pylint-report.txt

  # ═══════════════════════════════════════════════════════════
  # JOB 2 : TEST - Unit and integration tests
  # ═══════════════════════════════════════════════════════════
  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unity tests
        run: pytest test/unity/ -v --cov=src --cov-report=xml

      - name: Run integration tests
        run: pytest test/integration/ -v --cov=src --cov-append --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-coverage-report
          path: coverage.xml
          retention-days: 7
