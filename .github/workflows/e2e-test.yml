# GitHub Actions - End-to-End Tests
# Project: EyesDcar TEST
# Date: 23/04/2026
# Description: E2E Tests - Runs only on PR

name: E2E Tests

on:
  pull_request:
    branches:
      - 001-DEVELOPMENT
      - 002-TEST
      - 003-PRODUCTION
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB : E2E - Full end-to-end tests
  # ═══════════════════════════════════════════════════════════
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run e2e tests
        run: pytest test/e2e/ -v --cov=src --cov-report=xml --cov-report=term || echo "E2E tests completed"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-report
          path: coverage.xml
          retention-days: 7
