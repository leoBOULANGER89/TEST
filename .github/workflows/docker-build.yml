name: Docker Build and Push

on:
  push:
    branches:
      - 003-PRODUCTION
      - 002-TEST
    tags:
      - 'v*' # Se déclenche sur les tags de version (ex: v1.0.1)

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    name: Build, Scan and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ═══════════════════════════════════════════════════════════
      # METADATA & LOGIN
      # ═══════════════════════════════════════════════════════════
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/eyesdcar
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/003-PRODUCTION' }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ═══════════════════════════════════════════════════════════
      # BUILD (SANS PUSH POUR LE SCAN)
      # ═══════════════════════════════════════════════════════════
      - name: Build image (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./production/docker/Dockerfile
          load: true # Charge l'image localement pour Trivy
          tags: eyesdcar:test-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ═══════════════════════════════════════════════════════════
      # TRIVY (Image Scan)
      # ═══════════════════════════════════════════════════════════
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'eyesdcar:test-scan'
          format: 'table'
          exit-code: '1' # Bloque le build si des failles CRITICAL sont trouvées
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # ═══════════════════════════════════════════════════════════
      # PUSH FINAL
      # ═══════════════════════════════════════════════════════════
      - name: Build and push
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./production/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
