name: "Branch Naming Rules"

on:
  pull_request:
    types: [opened, edited, synchronize]
  push:
    branches-ignore:
      - 'main'
      - '001-DEVELOPMENT'
      - '002-TEST'
      - '003-PRODUCTION'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check Branch Name Convention
        run: |
          # Getting the branch name
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          # Your Regex
          REGEX="^(feature|bugfix|hotfix|release|DEV-[A-Z]{2,4})\/.*"

          echo "Checking branch: $BRANCH_NAME"

          if [[ ! $BRANCH_NAME =~ $REGEX ]]; then
            echo "---------------------------------------------------------"
            echo "❌ INVALID BRANCH NAME!"
            echo "The branch '$BRANCH_NAME' does not follow the EyesDcar conventions."
            echo "Allowed formats:"
            echo " - feature/name"
            echo " - bugfix/name"
            echo " - hotfix/name"
            echo " - release/vX.Y.Z"
            echo " - DEV-XXX/name (where XXX are your initials in UPPERCASE)"
            echo "---------------------------------------------------------"
            exit 1
          fi
          echo "✅ Valid branch name."
