# GitHub Actions - Security Scan
# Projet: EyesDcar TEST
# Date: 22/04/2026
# Description: Scan sécurité code (Bandit) et dépendances (Safety)

name: Security Scan

on:
  push:
    branches:
      - 001-DEVELOPMENT
      - 002-TEST
      - 003-PRODUCTION
  pull_request:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1 : BANDIT - Scan code source
  # ═══════════════════════════════════════════════════════════
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r src/ -c .pre-commit/.bandit -f json -o bandit-report.json || true

      - name: Run Bandit (screen output)
        run: bandit -r src/ -c .bandit -f screen || true

      - name: Check for HIGH severity issues
        run: |
          if [ -f bandit-report.json ]; then
            ISSUES=$(jq '[.results[] | select(.issue_severity == "HIGH")] | length' bandit-report.json 2>/dev/null || echo "0")
            if [ "$ISSUES" -gt 0 ]; then
              echo "Found $ISSUES HIGH severity issues!"
              exit 1
            fi
          fi
        shell: bash

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # JOB 2 : SAFETY - Scan dépendances Python
  # ═══════════════════════════════════════════════════════════
  safety:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Safety
        run: pip install safety

      - name: Run Safety check
        run: |
          safety check -r requirements.txt --json > safety-report.json || echo "{}" > safety-report.json

      - name: Check for vulnerabilities
        run: |
          if [ -f safety-report.json ]; then
            VULNS=$(jq 'length' safety-report.json 2>/dev/null || echo "0")
            if [ "$VULNS" -gt 0 ]; then
              echo "Found vulnerabilities in dependencies!"
              safety check || true
            fi
          fi
        shell: bash

      - name: Upload Safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # JOB 3 : SNYK - Analyse approfondie des dépendances
  # ═══════════════════════════════════════════════════════════
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ═══════════════════════════════════════════════════════════
  # JOB 4 : TRIVY FS - Scan du repo (Config, Secrets, Vulns)
  # ═══════════════════════════════════════════════════════════
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
